name: Request Frontend Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'

jobs:
  dispatch:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger deployment
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.INFRA_DISPATCH_TOKEN }}
          repository: lazy-universe/infra-automation
          event-type: deploy
          client-payload: >
            {
              "app": "noted",
              "component": "frontend"
            }