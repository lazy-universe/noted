name: Request Backend Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'

jobs:
  dispatch:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger infra deployment
        run: |
          curl --fail --silent --show-error \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.INFRA_DISPATCH_TOKEN }}" \
            https://api.github.com/repos/lazy-universe/infra-automation/dispatches \
            -d '{
              "event_type": "deploy",
              "client_payload": {
                "app": "noted",
                "component": "backend"
              }
            }'